<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora IMC</title>

<link rel="stylesheet" href="css/styles.css">

<!-- IMPORTANTE: defer -->
<script src="js/script.js" defer></script>

</head>

<body>

<div class="container">

    <div class="header">
        Calculadora IMC
    </div>

    <div class="form-box">

        <label>Peso (kg)</label>
        <input type="number" id="peso">

        <label>Altura (m)</label>
        <input type="number" id="altura" step="0.01">

        <button id="btnCalcular">
            Calcular
        </button>

    </div>

    <div class="resultado">
        Tu IMC es:
        <strong id="resultado">X</strong>
    </div>

</div>

</body>
</html>
