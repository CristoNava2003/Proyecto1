<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora IMC</title>

<!-- CSS -->
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        Calculadora IMC
    </div>

    <!-- Formulario -->
    <div class="form-box">

        <label>Peso (kg)</label>
        <input type="number" id="peso" placeholder="Ej: 70">

        <label>Altura (m)</label>
        <input type="number" id="altura" step="0.01" placeholder="Ej: 1.70">

        <button onclick="calcularIMC()">
            Calcular
        </button>

    </div>

    <!-- Resultado -->
    <div class="resultado">
        Tu IMC es:
        <strong id="resultado">X</strong>
    </div>

</div>

<!-- JS -->
<script src="js/script.js"></script>

</body>
</html>
